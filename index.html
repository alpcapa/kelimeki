<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Logo fontu (Caveat) ilk boyamada hemen görünür ve yedek fontu
         ("cursive") çok belirgin biçimde değiştiriyor — preload, bu küçük
         dosyanın CSS'ten bağımsız olarak hemen indirilmesini sağlayıp
         görünür font sıçramasını (bkz. src/fonts/caveat-logo.css) önler. -->
    <link rel="preload" href="/fonts/caveat-700-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Supabase isteklerinin (guest_visits vb.) DNS/TLS kurulumunu erkenden başlatır — kritik istek zincirindeki gecikmeyi azaltır -->
    <link rel="preconnect" href="https://xvqlizifakkkoqahaxsg.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://xvqlizifakkkoqahaxsg.supabase.co" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0F1C26" />
    <!-- Uygulamanın karanlık teması yok — bunu bildirmezsek Android
         Chrome'un "Zorla Karanlık Tema" özelliği sayfayı otomatik
         (ve tutarsızca) karartıp beyaz zeminleri siyaha çeviriyor. -->
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kelimeki" />
    <meta
      name="description"
      content="Kelimeki, ücretsiz online Türkçe stratejik kelime oyunu. 2 ya da 4 kişilik oyun seçeneği, Yapay Zeka'ya karşı oynanan Scrabble ve Kelimelik benzeri oyun — kayıt olmadan hemen oyna."
    />
    <link rel="canonical" href="https://kelimeki.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kelimeki" />
    <meta property="og:url" content="https://kelimeki.com/" />
    <meta property="og:title" content="Kelimeki - Stratejik Türkçe Kelime Oyunu" />
    <meta
      property="og:description"
      content="Yapay Zeka'ya karşı 2 veya 4 kişi oynanan, çok farklı bir kelime oyunu."
    />
    <meta property="og:image" content="https://kelimeki.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="tr_TR" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kelimeki - Stratejik Türkçe Kelime Oyunu" />
    <meta
      name="twitter:description"
      content="Yapay Zeka'ya karşı 2 veya 4 kişi oynanan, çok farklı bir kelime oyunu."
    />
    <meta name="twitter:image" content="https://kelimeki.com/og-image.png" />

    <!-- Yazı tipleri uygulamayla birlikte paketlenir, Google'a çağrı yok (src/main.tsx) -->
    <title>Kelimeki — Ücretsiz Online Türkçe Stratejik Kelime Oyunu</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Kelimeki",
        "url": "https://kelimeki.com/",
        "description": "Kelimeki, TDK sözlüğüne dayalı ücretsiz online Türkçe stratejik kelime oyunu. 2 ya da 4 kişilik oyun seçeneği, Yapay Zeka'ya karşı oynanan Scrabble ve Kelimelik benzeri oyun.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "inLanguage": "tr",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "TRY"
        }
      }
    </script>
  </head>
  <body>
    <div id="landscape-block" aria-hidden="true" data-nosnippet>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="12" width="24" height="36" rx="4" stroke="#2563EB" stroke-width="2.5" fill="none"/>
        <path d="M36 8 Q44 16 36 24" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <polyline points="33,20 36,24 40,21" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <p>Dikey konuma getirin</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
