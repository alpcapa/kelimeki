  <!-- Lowercase h: right stem -->
  <rect x="318" y="200" width="48" height="192" rx="12" fill="#00C8FF"/>
  <!-- Underline -->
  <rect x="126" y="416" width="260" height="18" rx="9" fill="#00C8FF"/>
</svg>
